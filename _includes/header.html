<header>
  <a href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
  <nav aria-label="Primary">
    {%- for path in site.header_pages -%}
      {%- for nav_page in site.pages -%}
        {%- if nav_page.path == path and nav_page.title -%}
          <a href="{{ nav_page.url | relative_url }}">{{ nav_page.title | escape }}</a>
        {%- endif -%}
      {%- endfor -%}
    {%- endfor -%}
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </nav>
</header>
